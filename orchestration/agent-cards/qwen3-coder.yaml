name: "Qwen 3-Coder:30B"
model: "ollama/qwen3-coder:30b-256k"
role: "Specialized Code Generation"
context_window: 262144
parameters:
  temperature: 0.3
  top_p: 0.9
  repeat_penalty: 1.0

strengths:
  - "Code generation optimized (trained on code datasets)"
  - "GDScript + C# fluency"
  - "Test-first patterns"
  - "Refactoring and optimization"
  - "Bug fixing and debugging"
  - "Fast inference"
  - "Handles long code files"

capabilities:
  can_generate_code: true
  can_write_tests: true
  can_optimize: true
  can_refactor: true
  can_debug: true
  can_review_code: true

weaknesses:
  - "Not great at game design decisions"
  - "Limited general reasoning"
  - "Less flexible on non-code tasks"
  - "May miss architectural implications"

best_for:
  - "Implementation tasks"
  - "Writing/reviewing C# and GDScript logic"
  - "Test scaffolding"
  - "Bug fixes"
  - "Code refactoring"
  - "Performance optimization"

worst_for:
  - "Game design specs"
  - "Architectural decisions"
  - "Multi-domain coordination"
  - "Long-form reasoning"

dispatch_criteria:
  - "Task contains: 'write', 'implement', 'refactor', 'fix', 'debug'"
  - "Task is pure-logic (no UI/art decisions)"
  - "Orchestrator says 'needs implementation speed'"
  - "Task is code review or optimization"

fallback_chain:
  - "devstral-small:24b"
  - "qwen3.6:35b"
