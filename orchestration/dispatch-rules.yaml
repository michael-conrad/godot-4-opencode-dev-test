# Dispatch Rules for Multi-Agent Orchestration
# Used by the orchestrator to route tasks to the best agent

version: "1.0"
last_updated: "2026-06-28"

# Deterministic routing by task type/keywords
dispatch_rules:
  - id: "code_generation_speed"
    condition: "task_type == 'code_generation' AND speed_required == true AND specialized == true"
    primary: "qwen3-coder:30b"
    fallback: "devstral-small:24b"
    reason: "Coder model optimized for speed + code quality"

  - id: "code_generation_quality"
    condition: "task_type == 'code_generation' AND quality_required == true"
    primary: "qwen3-coder:30b"
    fallback: "granite4.1:30b"
    reason: "Coder model for quality code generation"

  - id: "long_context_code_review"
    condition: "task_type == 'code_review' AND context_size > 100000"
    primary: "devstral-small:24b"
    fallback: "qwen3-coder:30b"
    reason: "384K context allows full codebase review"

  - id: "game_design_spec"
    condition: "task_type == 'game_design' OR task_type == 'spec_writing'"
    primary: "qwen3.6:35b-orchestrator"
    fallback: "nemotron3:33b"
    reason: "Orchestrator for design coordination"

  - id: "architecture_decision"
    condition: "task_type == 'architecture' OR task_type == 'system_design'"
    primary: "qwen3.6:35b-orchestrator"
    fallback: "nemotron-cascade:30b"
    reason: "Orchestrator for architectural reasoning"

  - id: "verification_qa"
    condition: "task_type == 'verification' OR task_type == 'qa_check' OR task_type == 'code_review'"
    primary: "nemotron3:33b"
    fallback: "qwen3.6:35b-orchestrator"
    reason: "Nemotron strong on verification"

  - id: "task_decomposition"
    condition: "task_type == 'planning' OR task_has_reasoning_loop == true"
    primary: "qwen3.6:35b-orchestrator"
    fallback: "nemotron-cascade:30b"
    reason: "Orchestrator for multi-step planning"

  - id: "gdscript_implementation"
    condition: "language == 'gdscript' AND task_type == 'implementation'"
    primary: "qwen3-coder:30b"
    fallback: "devstral-small:24b"
    reason: "Coder model knows GDScript well"

  - id: "csharp_implementation"
    condition: "language == 'csharp' OR language == 'c#' AND task_type == 'implementation'"
    primary: "qwen3-coder:30b"
    fallback: "granite4.1:30b"
    reason: "Coder model knows C# well"

  - id: "fast_prototype"
    condition: "speed_required == true AND quality_required == false"
    primary: "devstral-small:24b"
    fallback: "mistral-small3:24b"
    reason: "Devstral small for rapid iteration"

  - id: "instruction_following"
    condition: "task_has_detailed_spec == true"
    primary: "nemotron3:33b"
    fallback: "gemma4:31b"
    reason: "Strong instruction following required"

  - id: "uncertain_routing"
    condition: "task_domain_unclear == true OR no_match == true"
    primary: "nemotron3:33b"
    fallback: "qwen3.6:35b-orchestrator"
    reason: "Nemotron as balanced fallback"

# Keyword-based routing (supplementary)
keyword_routing:
  - keywords: ["write", "implement", "code", "script"]
    primary: "qwen3-coder:30b"

  - keywords: ["design", "spec", "architecture", "system"]
    primary: "qwen3.6:35b-orchestrator"

  - keywords: ["review", "verify", "check", "validate"]
    primary: "nemotron3:33b"

  - keywords: ["quick", "fast", "rapid", "prototype"]
    primary: "devstral-small:24b"

  - keywords: ["plan", "decompose", "organize", "coordinate"]
    primary: "qwen3.6:35b-orchestrator"

  - keywords: ["debug", "fix", "bug", "error"]
    primary: "qwen3-coder:30b"

# Fallback chain (used when primary unavailable)
fallback_chain:
  - "nemotron3:33b"
  - "qwen3.6:35b-orchestrator"
  - "qwen3-coder:30b"
  - "qwen3.5:35b"
  - "granite4.1:30b"
  - "devstral-small:24b"
  - null  # Hard failure

# Error handling
error_handling:
  max_retries: 3
  retry_delay_seconds: 2
  timeout_seconds: 300
  on_timeout: "escalate_to_orchestrator"
  on_failure: "try_fallback"
