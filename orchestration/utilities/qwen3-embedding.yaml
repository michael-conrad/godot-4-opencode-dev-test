# NOTE: This is NOT an agent. It is a utility service accessed via Ollama API only.
# Used by agents when semantic search or embedding generation is needed.

name: "Qwen 3-Embedding:40K"
model: "ollama/qwen3-embedding:40k"
role: "Semantic Search & Embedding Service"
type: "utility_service"

api_endpoint: "http://localhost:11434/api/embeddings"
api_method: "POST"

capabilities:
  can_embed: true
  can_generate_vectors: true
  can_compute_similarity: false  # Use external tools for similarity

use_cases:
  - "Generate vector embeddings for code snippets"
  - "Generate vector embeddings for documentation"
  - "Generate vector embeddings for conversation history"
  - "Support semantic search within agents"
  - "Support context compression and retrieval"

which_agents_use_this:
  - "Any agent performing semantic search"
  - "Context retrieval operations"
  - "Documentation indexing"

request_format:
  model: "qwen3-embedding:40k"
  prompt: "text to embed"

response_format:
  embedding: "[float array of dimensions]"
  model: "qwen3-embedding:40k"

parameters:
  dimensions: 1536  # Vector dimension size
  similarity_metric: "cosine"  # Recommended for similarity computation
