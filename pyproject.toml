[build-system]\nrequires = [\"hatchling\"]\nbuild-backend = \"hatchling.build\"\n\n[project]\nname = \"godot-4-opencode-dev-test\"\nversion = \"0.1.0\"\ndescription = \"Multi-agent orchestration system for Godot 4 game development\"\nreadme = \"README.md\"\nrequires-python = \">=3.10\"\nlicense = {text = \"MIT\"}\nauthors = [\n    {name = \"Michael Conrad\", email = \"michael@example.com\"}\n]\nkeywords = [\"godot\", \"game-dev\", \"ai\", \"llm\", \"orchestration\", \"ollama\"]\nclassifiers = [\n    \"Development Status :: 3 - Alpha\",\n    \"Intended Audience :: Developers\",\n    \"License :: OSI Approved :: MIT License\",\n    \"Programming Language :: Python :: 3\",\n    \"Programming Language :: Python :: 3.10\",\n    \"Programming Language :: Python :: 3.11\",\n    \"Programming Language :: Python :: 3.12\",\n]\n\ndependencies = [\n    \"requests>=2.31.0\",\n    \"pyyaml>=6.0\",\n]\n\n[project.optional-dependencies]\ndev = [\n    \"pytest>=7.4.0\",\n    \"pytest-cov>=4.1.0\",\n    \"black>=23.7.0\",\n    \"ruff>=0.0.287\",\n    \"mypy>=1.4.1\",\n]\n\n[project.urls]\nHomepage = \"https://github.com/michael-conrad/godot-4-opencode-dev-test\"\nRepository = \"https://github.com/michael-conrad/godot-4-opencode-dev-test.git\"\nIssues = \"https://github.com/michael-conrad/godot-4-opencode-dev-test/issues\"\n\n[tool.uv]\ndev-dependencies = [\n    \"pytest>=7.4.0\",\n    \"pytest-cov>=4.1.0\",\n    \"black>=23.7.0\",\n    \"ruff>=0.0.287\",\n    \"mypy>=1.4.1\",\n]\n\n[tool.black]\nline-length = 100\ntarget-version = ['py310', 'py311', 'py312']\n\n[tool.ruff]\nline-length = 100\ntarget-version = \"py310\"\nselect = [\"E\", \"F\", \"W\"]\nignore = [\"E501\"]  # line too long (handled by black)\n\n[tool.mypy]\npython_version = \"3.10\"\nwarn_return_any = true\nwarn_unused_configs = true\ndisallow_untyped_defs = false\n"